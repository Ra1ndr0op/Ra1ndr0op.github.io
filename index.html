<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ra1ndr0op | 即将上线</title>
    <meta
      name="description"
      content="Ra1ndr0op 即将上线。留下邮箱，第一时间收到产品开放通知。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">Waitlist</p>
          <h1 id="page-title">Ra1ndr0op</h1>
          <p class="intro">
            产品正在准备中。留下邮箱，第一时间收到上线通知和早期体验入口。
          </p>

          <form class="waitlist-form" id="waitlist-form" novalidate>
            <label class="sr-only" for="email">邮箱地址</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              inputmode="email"
              placeholder="your@email.com"
              required
            />
            <button type="submit">通知我</button>
          </form>

          <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
        </div>

        <div class="signal-visual" aria-hidden="true">
          <div class="orbit orbit-one"></div>
          <div class="orbit orbit-two"></div>
          <div class="signal-card">
            <span class="status-dot"></span>
            <span>全球边缘节点已就绪</span>
          </div>
          <div class="email-chip chip-one">hello@ra1ndr0op.dev</div>
          <div class="email-chip chip-two">early@product.test</div>
          <div class="email-chip chip-three">launch@soon.io</div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("waitlist-form");
      const emailInput = document.getElementById("email");
      const message = document.getElementById("form-message");
      const submitButton = form.querySelector("button");

      function setMessage(text, type) {
        message.textContent = text;
        message.dataset.type = type;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const email = emailInput.value.trim();
        if (!email) {
          setMessage("请输入邮箱", "error");
          emailInput.focus();
          return;
        }

        submitButton.disabled = true;
        setMessage("提交中...", "neutral");

        try {
          const response = await fetch("/api/subscribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await response.json();

          if (response.ok) {
            setMessage(data.message || "成功加入等待列表！", "success");
            emailInput.value = "";
          } else {
            setMessage(data.error || "出错了，请稍后重试", "error");
          }
        } catch {
          setMessage("网络连接失败，请稍后重试", "error");
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
